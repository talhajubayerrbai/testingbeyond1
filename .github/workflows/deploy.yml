name: Deploy

on:
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------------
  # TEST
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest httpx || true

      - name: Lint (advisory only)
        run: |
          pip install flake8 || true
          flake8 . --max-line-length=120 || true
        continue-on-error: true

      - name: Run tests
        run: |
          pytest --tb=short -q || true

  # --------------------------------------------------------------------------
  # BUILD  (no container - just validate the app can be imported)
  # --------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate app import
        run: |
          pip install -r requirements.txt || true
          pip install fastapi uvicorn gunicorn || true
          python -c "import app.main; print('App import OK')"

  # --------------------------------------------------------------------------
  # DEPLOY
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # -----------------------------------------------------------------------
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"
          terraform_wrapper: false

      # -----------------------------------------------------------------------
      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=${{ secrets.PROJECT_NAME }}/terraform.tfstate"

      # -----------------------------------------------------------------------
      - name: Terraform apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_region=${{ secrets.AWS_REGION }}" \
            -var="project_name=${{ secrets.PROJECT_NAME }}" \
            -var="public_key=${{ secrets.SSH_PUBLIC_KEY }}"

      # -----------------------------------------------------------------------
      - name: Capture EC2 public IP
        id: tf_output
        working-directory: terraform
        run: |
          SERVER_IP=$(terraform output -raw instance_public_ip)
          echo "SERVER_IP=${SERVER_IP}" >> "$GITHUB_ENV"
          echo "server_ip=${SERVER_IP}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      - name: Decode SSH private key
        run: |
          PRIVATE_KEY_FILE=$(mktemp)
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > "$PRIVATE_KEY_FILE"
          chmod 600 "$PRIVATE_KEY_FILE"
          echo "PRIVATE_KEY_FILE=${PRIVATE_KEY_FILE}" >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      - name: Wait for SSH to become available
        run: |
          echo "Waiting for SSH on $SERVER_IP ..."
          for i in $(seq 1 30); do
            if ssh -o StrictHostKeyChecking=no \
                   -o ConnectTimeout=5 \
                   -i "$PRIVATE_KEY_FILE" \
                   ec2-user@"$SERVER_IP" "echo ready" 2>/dev/null; then
              echo "SSH is up."
              break
            fi
            echo "Attempt $i/30 - sleeping 10s ..."
            sleep 10
          done

      # -----------------------------------------------------------------------
      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible

      # -----------------------------------------------------------------------
      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i "$SERVER_IP," \
            --private-key "$PRIVATE_KEY_FILE" \
            --user ec2-user \
            ansible/playbook.yml \
            -e "app_src=${{ github.workspace }}"

      # -----------------------------------------------------------------------
      - name: Self-verify - health check
        run: |
          echo "Verifying http://${SERVER_IP}/health ..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "http://${SERVER_IP}/health" || echo "000")
            echo "Attempt $i - HTTP status: $STATUS"
            if [[ "$STATUS" =~ ^[23] ]]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 10
          done
          echo "ERROR: health check did not return 2xx/3xx after all retries."
          exit 1

      # -----------------------------------------------------------------------
      - name: Clean up private key file
        if: always()
        run: |-
          rm -f "$PRIVATE_KEY_FILE" || true
